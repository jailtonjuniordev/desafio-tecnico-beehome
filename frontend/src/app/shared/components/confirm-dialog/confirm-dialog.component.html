<h2 mat-dialog-title class="confirm-title">{{ data.title }}</h2>

<mat-dialog-content class="confirm-content">
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
  <button mat-button class="bh-ghost" type="button" (click)="onCancel()">
    Cancelar
  </button>
  <button mat-flat-button class="bh-cta" type="button" (click)="onConfirm()">
    {{ data.confirmLabel || 'Confirmar' }}
  </button>
</mat-dialog-actions>
