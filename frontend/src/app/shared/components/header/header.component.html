<mat-toolbar class="app-toolbar">
  <a class="toolbar-brand" routerLink="/tasks" aria-label="BeeHome">
    <img
      class="brand-logo"
      src="logotipo-beehome-branco.svg"
      alt="BeeHome"
      width="140"
      height="35"
    />
  </a>
  <span class="toolbar-spacer"></span>
  <button
    mat-icon-button
    class="toolbar-profile"
    type="button"
    routerLink="/profile"
    aria-label="Meu perfil">
    <mat-icon>person</mat-icon>
  </button>
  <button mat-button class="toolbar-logout" type="button" (click)="logout()">
    <mat-icon>logout</mat-icon>
    Sair
  </button>
</mat-toolbar>
